front:
  text: 太玄寶典卷下
  hash: sha256:17ac0f3e82228741189fa9b0ef8d01fc6f2474978aab3181c1b7712cbd280d6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0057_HFL_003-001a, image: hfl/0703/0703-168.png}
body:
  text: 養氣構神門木神養神章陰陽之妙造化五行各有眞一至神之物生於洞天福地人遇之者可以爲眞仙木之神茯苓是也服之得法能生神明輕便四肢茯苓末之爛研青松葉水和煑之惟茯苓碧緑色透爲度暴乾以末蜜和丸日三服如橡子大清旦水下通神不老不飢辟穀去五味服之三百日體生青毛無寒暑更加梨子無暑加浮萍無寒矣木精養精章天地之精英結而爲不凋之木葉嫩子柔能生精通百脉换凡軀生深山谷高奇之狀無人迹處者可採之柏木仁是也和嫩葉杵三萬六千下雜以木蜜塞新筒中以東流山泉煑之並無苦味惟甘辛异香耳向日用水下一棗許百日外不飢精自秘雖摇動不泄也亦無寒暑見鬼神步及奔馬精氣保守百疾已驅乆乆四肢生青毛耳鼻赤色是也木氣養氣章東方生風風生木木生萬物故能生氣木之生氣枸杞是也四時之精各有所在春採葉夏採花秋採子冬採根今人之用推四時取之以服有十應其眞人洞天秘訣四時各取採候四季周足淨擇洗了銼之用糯米拌之炊入瓮藥一斤米一斗自冬至前下驚蟄出之已成如黑金色且服之百日外髭鬢如漆色若處子行步如飛登山涉險終日不倦肌膚潤澤目有神光惟少思慮絶愛慾爲上木英點骨章太虛之神至秀之英降於五行而聚中央其氣爲椒禀五行通九竅化筋滋骨髓蒸鬱不已點化凡骨成眞仙久久服之骨中自覺若蟲行其骨髓老而不枯竭死則筋不腐取椒紅不用白皮黑子得一斤爲度以楓香煉和之重湯煑七日就潤可丸一梧桐子大每日清水面東下七百日外通神明目有神光皮膚按之若無肉堅硬暗地可視長生久視羽化之道自此耳五芝通神明章芝者天地至靈陰陽冲和之氣而生芝有五色能補五行眞氣眞人採五芝爲丹其效能通神明化凌空集神全眞焉以五色芝各以木蜜煑七日七夜出之擇神日服之以酒少少飲之助力七日外日中見天象乘虎豹召雲龍呼神鬼耳其新生芝得之便以酒蜜煑食之其效亦同焉仙人長壽杖章仙人採青竹長七尺而十二節者以雌黄酒調石腦油灌之兩頭蜜封又用楮葉二十四重裹了以少黄土覆之上以麥皮一斗隴之其上燒之勿令火炎但蒸鬱透自然有金色光明可以撻百怪役萬靈携之不死不疾所在神明護之老翁木馬章眞人以木馬爲老人馭者所以濟衰人之勞也藥用乳香没藥陽起石等分爲丹酒下七丸服畢如人行十里許以木通楮子椒湯浴之爲之七日外步及奔馬登涉皆不覺疲故得安適如登木馬故有此名也養氣增靈門草神生神章草者陰陽冲和之氣由雨露而滋萌生養有情益人利氣草中有至神服之能生神爲神者黄精是也煉之有法服之有理黄精九兩九蒸九暴研爲膏以青黛一兩和之銅器重湯煎之色如碧玉爲丸櫻桃大每服一丸面東水下七日神全七七日眞神生眞神生者閉目已如坐闇室也草精生精章草中有精靈之物能令人長生生精益髓精竭再生髓竭再行草精甘菊是也得四兩爲菊花四兩清酒煑一沸出之暴乾爲末每服方寸七以清水下七日外精生不窮矣草氣生氣章天地之氣由陰陽而分陰陽之氣則爲萬物其草中有最得其氣者地黄是也服之榮血脉堅牙齒烏髭髮光澤四肢體人服之各有異術地黄收之得多則蒸之極爛研出滓取膏汁雜以海鹽十分之一勿與婦人服血妄行也而成疾男子生虛弱服之七丸如麻子大清水下七日氣盛如嬰童大有益耳草丹度世章太上有七十二種丹惟九華草靈丹能度人出世眞仙之階不出於法乎天之精天門冬是也地之精地黄是也日之精枸杞是也月之精松黄是也陰之精遠志是也陽之精人參是也山之精巨勝是也水之精藕節是也人之精菊花是也九藥各等分採擇精靜杵爛以百草和露包裹用葛藤緊扎以米五斗同蒸之米熟出之夜攤布於月明中五更水露陰乾爲末蜜爲丸日服一棗大旦用水下不出七日可以度世心自通神明不飢不渴骨堅輕體可以居山矣靈草换肌章凡人之肌肉有乆病者或氣血骨已死者皆令活惟眞人以靈草换肌靈草者東方甲乙日採防風庚辛日暴乾丙丁日採艾壬癸日暴乾西方庚辛日採菖蒲甲乙日暴乾北方壬癸日採菊花丙丁日暴乾四藥用戊己日入臼杵之三千六百下爲末用藕節汁爲丸如豆大日三服七日外肌肉無病百邪乃退夙氣不干以凡成眞以老成童非遇有道不可教服之草通九竅章人有九竅相通則爲眞人窒塞則爲下鬼九竅不通無以知好惡是非邪正故眞人之道先度人通九竅其藥乃神妙神功之草也藥用菖蒲一寸九節者末之和以楮汁爲丸每服酒下七丸緑豆許百日外立知有應夜不寐不知倦色流香味皆易辨之人所不達已先達焉草五行丹章草中有五行眞人採之成丹服之可以内五行自聚精氣神者皆正其藥東方之靈人參也南方之靈菖蒲也中央之靈地黄也西方之靈巨勝也北方之靈黄精也以五丹添水同蒸三日三夜取出暴乾爲末煉松脂爲丸桐子大日七服温水下七丸七日成眞氣夢想通靈氣血滋榮身體筋骨精固神定耳服水章眞人服水所以益眞氣元也凡有停厨法有治病法有驅邪法有益氣法不靜體法各各有通神之妙應也停厨者居山或山荒之地欲絶粒服水益脾不羸不弱者先存脾元作黄氣繚繞次令火力下行透骨閉息三百六十握固嚥氣眞津亦三百六十乃服水水一盞向日傾一半擎之以左手藥叉印擎水右手緊拳向東念輕元法水流入吾心化白光白光溢脾脾化爲石急急如律令七遍吹入水存白兔入水每日清旦服之七日外不飢初服先數日少少飲粥服水未得力可服棗栗少少以助神力治病者有疾有鐘或他或己皆可令服悉得安泰以右手三指擎水一盞向北念元夫使者金頭羅神七遍其水自沸溢非有道氣者但有清靜條戒用事然未沸溢但先有氣也眞人用火自水生耳驅邪者有鬼神害生人及鬼神怪物所苦百端幻惑可以正之也以左手三指擎水一盞向南念大悲神首赤髮元神七遍以水用楊柳枝向邪物灑之乃息他人已彼苦或灑或令飲之乃醒焉益氣者眞人救助令虛弱以眞氣神水令飲之也以水一盞傾一半右手三指擎之向南取眞陽之氣七口存赤鳥七枚飛入其水中次飲火一神火入吾神泉眞氣滋生長壽萬年急急如律令七遍吹入水中凡飲先閉目靜思少少飲之有病亦愈靜體者人之身心逐愛流惡滋生穢濁行乎塵世眞人天靈遠而思之故眞人有教人凡事止眞祀者洗沐者必先靜體焉洗沐既畢定身心以水一盞星月下向天祝云天靈不濁地靈不摇急急如生星令七遍吹入水次端坐正南面久之是其應也凡用各神靈之景象焉登雲章眞人了生死之源知眞一之道煉氣全眞定神虛一乆火氣自固神自定氣固然後圓轉神定然後通靈知生死之期達出世之妙故了生了死是謂眞人出死入生是謂仙人欲知死期應數不可過者三元者夜月明中臨流一和竹枝用香爐中燒松脂一兩其煙用竹枝拂之令度水其水上煙不旋轉圓聚者其年必死以其竹枝向月拂卜定影一點爲一月卜其日又卜其時知其時欲以其鬼箭人參帶之行二氣圓轉默坐正室去藥物絶思慮拂塵念揭天門而往自然頂中有白光人皆見之神妙之道不可傳出世耳太玄寶典卷下
