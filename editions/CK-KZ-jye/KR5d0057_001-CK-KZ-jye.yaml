body:
  text: 氣虛生神神虛生化化虛生象皆出太虛太虛者在天地之中無方無所非氣非形其中有象清而爲天濁而爲地清濁分而生人故人生而不有清濁清濁旣分中包太虛澄煉守則虛白生虛白生則濁亦清神自虛而靈自清得天象應之鬼神陰陽萬物妙機咸悟眞人之道蓋煉虛靈而滌昏濁也氣者象之主而有清濁焉清者昇騰之元濁者生發之基無濁不能形無清不能眞得其清者陽眞而虛故能應物出死入生移形化迹蓋氣虛靈而致也若欲煉之當先虛心養氣圓念定神使氣常營營而自靈洞應萬物神化乃行天地之妙無不得之蓋氣煉之而靈洞達其應無方推運不窮是謂道也精者眞也眞者眞元也陰陽之本生死之基也人能保命在堅精堅精者煉氣養神之謂也氣固而厚精說以元術而堅神定而保命命以氣生而久故眞人煉生氣固眞精保命長年其知者先養氣氣營守精精自固外以火運則精自堅氣出生氣之源養精成玄胎惟精不搖氣常運是妙道也天生氣地生形命以氣爲主形以血爲根知天者養命知地者養氣眞人導氣自丹田上行不使散漫自右腎循腰及下足足後上行脅下右膊循右手復上肩井入耳上腦後下左耳過肩井下左膊循左手復過左脅交腰下左足復上還丹田凡自半夜守定心息氣覺頂門冷氣透華池兩耳如流水聲時正生氣也此氣自然行天地交媾之脈凡動處左以右手按之右以左手按之生氣流源使不住滯則天地配形形同天地日得功多爲最三千功後自然通流不老不死長年返嬰童顏耳男子稟天道得陽之氣生腎女子稟地道得陰之氣生血生心故男子煉氣成眞而保精女子煉血成眞而保神陰陽造化各有異焉所行之道亦各不同男子守腎固精煉氣夾臍循脊骨上泥丸號曰還元女子守心養神煉火不動以兩乳氣下腎夾腎上行亦到泥丸號曰化眞行之百日男子精不泄氣長生返嬰童神靈矣女子血不動神自定返處子而收二脈一化乳二化血其妙萬端久久行之生髮平乳移腎變形焉人欲行氣先定胎息胎息者自然之息調定息數使氣不上不下不出不入口鼻內自然往來於胸中半夜氣所生時以行之旣久百日外可養氣伏息耳又氣先煉通兩耳隨左右手掩耳半夜時正以氣引之久久自通氣若通兩耳口鼻不須出氣可以伏息耳其氣旣行半夜煉氣正一元氣動以兩手掩耳令氣上行及以手按摩之其氣逆行遂於皮膚或去或住皆在已也南方生火火生心心爲丹砂丹砂中有汞重四兩北方生水水生腎腎爲青金青金生鉛重四兩心靜汞生腎定鉛生鉛汞昇降相遇金鼎煉成大丹點化至藥心動無以見汞失汞則丹砂枯面黃白無光澤皮膚不紅潤腎動無以見鉛失鉛則青金枯面青黑無光彩皮膚皆乾澀何也良以二氣無本鉛汞不生不得至人之論行之徒自費工耳故仙人煉氣保腎多得鉛生定神養心多得汞發鉛汞綿綿在世長年惟在二氣本源固密澄潔耳虛無爲體寂照爲用陰陽之不可以數拘天地之不可以物對人皆有之蓋以塵土綠愛相汨而不得見之古今雖以法不可名雖以事不可致惟眞人返朴還純澄明寂默以守之其妙用在塵心爲室除妄爲眞其神自虛生然無形迹妙洞三界窮生死之根達利害之源乃神之應也神無所不能致而化其神神則神在我而爲眞天地之神我亦神之萬象之神我亦神之神所化者在守寂不動昇眞氣以兩手相疊左手壓右手以摩頂上三千功後神自出外也氣至靈也千經萬論惟以存想按摩爲用大悲眞聖自然之數氣至靈隨心以動常欲行也蓋人心反復而氣乃澁憂思爲住滯喜樂爲流蕩皆失本經故眞人者煉氣令圓然始以心營終別自致起於丹田轉若皮囊行之周三宫舊以三等疾速緩急之異爲三車般上泥丸眞秘之訣不須此耳惟以氣圓固先極功多圓轉次用他人以兩手向腰之上頭升項其氣自過乃咽華池之液四十九過眞氣乃固而圓定又能養化其氣以成眞故曰氣化氣乃眞仙矣保精在煉氣氣正然後精固精固密然後可煉古今惟知煉氣不知煉眞精之訣眞人煉其精者固密其精精久不泄常欲動方以力煉之九重密閉坐先存大小固尾閭三時九氣與精交臍下若毛球動轉不已其精煉之子午二時各行三百六十功十日外眞精自化奪陰陽交合返復氣液久有大益以兩手握固以大拇指按定中指文以力向上提縱動搖亦不能泄也男子得天之純陽多者也女子得地之純陰多者也純陽之道行之易成純陰之道行之難致眞人有回男作女回女作男之道蓋所以易氣也女子血盛氣衰煉血保氣男子血衰氣盛煉氣保血男子女子稟天地之正氣可以移其妙也男子煉元氣定神先守心如一外物不入萬法不着積精養神女子煉血收二乳脈按之以兩手按摩面上逆行以氣運之乃化人以左手爲陽內主腎半夜氣自腎生神從心降握左手不開閉左目不視存神至腎出左目下左手三百六十功乃開午時氣自心降神從腎升握右手不開閉右目不視存神至心出右目下右手三百六十功乃開如此行三千日可視千萬里之事天地山川星象草木莫不知數莫不知靈人心不測之事皆可得之矣先調氣令不出不入自固密常漱華池眞精三千功胎息旣行津液成玄珠可吐而又納之不惟長年亦可閉尾閭成眞精胎息玄珠自久久結自下上泥丸不絕則長生焉眞精生鉛鉛生黃華定神生汞汞生玄珠汞因內津而生玄珠使氣或上或下旋轉不已久久自覺津液咽下有物如珠下或欲行出之液出汲入黃中自結可結在舌上鉛因運氣而生黃華使氣不上不下向左而轉久久不已氣在臍下小便其出青色其氣自可出入運動欲出乃氣透尾閭之色金黃色如鉛丹人之修煉鉛汞見寶乃眞人矣神煉之可以出形何謂煉神所謂守心守心惟能定神不老非可出神超生也出神超生者在圓神也古今徒說圓氣保眞未說圓神煉眞夫圓神煉眞者先存心如明月形中彷彿有人坐煉圓不定上抵泥丸下窮丹海久久身有光彩自身中出隨其光彩出身外無有身形定洞自然因神出神故曰神出神矣氣眞保眞煉氣與天地齊年蓋以氣爲道本道從氣生氣從空有眞氣不搖故可長生氣者行於體內營周一身煉之從下丹田半夜所生氣處行之心營氣運力舉手按之久久肌膚紅光通明氣正而不散泄以成眞矣修行之士須要精神氣全也精全則耳潤肌澤神全則面澤目清氣全則音響體輕夫人修行欲三者之備則定心絕念內存空洞運氣降升無有停碍保固精液還元不泄先正心咽七七口大和其津神想安居心如明月照身外氣氣無運大力上行泥丸積精不泄隨氣上昇久久長生則九竅通明四肢强健耳天地賦其形氣生則居世絕俗愛死則脫殻斷塵緣生則滅形藏於影死則集神構於眞皆有法焉形滅後者冬至日日初出向日行登東方山大松下手提赤芝必有鬼物相迎呼天狼七徧其鬼必自身後收黑氣走向覆身此則陰消而無影神鬼不可犯之死則集神神不散構精不移也神靈者因人得之或公正則爲神邪淫則爲鬼而修眞之士欲驅之當正已神出神光於身外自然有異人驅前或送或禁皆從已命也老者衰少者强常理也老者反壯少者已衰一氣稟二消耗眞人以法齊之老者反壯少者益强人之氣衰欲强盛者當服九仙太液法其道煉氣定神體安內八十一眞液其液如不甘久久乃得甘味少者自甘以手引氣自心下腎不出七日老者如嬰兒矣有生不死謂之長生有死不死長生者生而煉之也不死者返
