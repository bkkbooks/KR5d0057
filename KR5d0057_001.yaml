front:
  text: 太玄寶典卷上中下同卷去六
  hash: sha256:ce2fe052f3dcfbb734da53e4b7d049fc2a2a0bcd63fc491243d6ec9a91b4827a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0057_HFL_001-001a, image: hfl/0703/0703-128.png}
body:
  text: 修真冲寂門神靈天象章氣虛生神神虛生化化虛生象皆出太虛太虛者在天地之中無方無所非氣非形其中有象清而為天濁而為地清濁分而生人故人生而不有清濁清濁既分中包太虛澄煉守則虛白生虛白生則濁亦清神自虛而靈自清得天象應之鬼神陰陽萬物妙機咸悟真人之道蓋煉虛靈而滌昏濁也氣虛洞應章氣者象之主而有清濁焉清者升騰之元濁者生發之基無濁不能形無清不能真得其清者陽真而虛故能應物出死入生移形化迹蓋氣虛靈而致也若欲煉之當先虛心養氣圓念定神使氣常營營而自靈洞應萬物神化乃行天地之妙無不得之蓋氣煉之而靈洞達其應無方推運不窮是謂道也精堅保命章精者真也真者真元也陰陽之本生死之基也人能保命在堅精堅精者煉氣養神之謂也氣固而厚精以元術而堅神定而保命命以氣生而久故真人煉生氣固真精保命長年其知者先養氣氣營守精精自固外以火運則精自堅氣出生氣之源養精成玄胎惟精不搖氣常運是妙道也天地配形章天生氣地生形命以氣為主形以血為根知天者養命知地者養氣真人導氣自丹田上行不使散漫自右腎循腰及下足足後上行脅下右膊循右手復上肩井入耳上腦後下左耳過肩井下左膊循左手復過左脅交腰下左足復上還丹田凡自半夜守定心息氣覺頂門冷氣透華池兩耳如流水聲時正生氣也此氣自然行天地交媾之脉凡動處左以右手按之右以左手按之生氣流源使不住滯則天地配形形同天地日得功多為最三千功後自然通流不老不死長年返嬰童顔耳陰陽造化章男子禀天道得陽之氣生腎女子禀地道得陰之氣生血生心故男子煉氣成真而保精女子煉血成真而保神陰陽造化各有異焉所行之道亦各不同男子守腎固精煉氣夾臍循脊骨上泥丸號曰還元女子守心養神煉火不動以兩乳氣下腎夾腎上行亦到泥丸號曰化真行之百日男子精不泄氣長生返嬰童神靈矣女子血不動神自定返處子而收二脉一化乳二化血其妙萬端久久行之生髮平乳移腎變形焉胎息自然章人欲行氣先定胎息胎息者自然之息調定息數使氣不上不下不出不入口鼻內自然往來於胸中半夜氣所生時以行之既久百日外可養氣伏息耳又氣先煉通兩耳隨左右手掩耳半夜時正以氣引之久久自通氣若通兩耳口鼻不須出氣可以伏息耳其氣既行半夜煉氣正一元氣動以兩手掩耳令氣上行及以手按摩之其氣逆行遂於皮膚間或去或住皆在已也鉛汞發萌章南方生火火生心心為丹砂丹砂中有汞重四兩北方生水水生腎腎為青金青金生鉛重四兩心靜汞生腎定鉛生鉛汞升降相遇金鼎煉成大丹點化至藥心動無以見汞失汞則丹砂枯面黃白無光澤皮膚不紅潤腎動無以見鉛失鉛則青金枯面青黑無光彩皮膚皆乾澀何也良以二氣無本鉛汞不生不得至人之論行之徒自費工耳故仙人煉氣保腎多得鉛生定神養心多得汞發鉛汞綿綿在世長年惟在二氣本源固密澄潔耳修真符聖門神化神章虛無為體寂照為用陰陽之不可以數拘天地之不可以物對人皆有之蓋以塵土緣愛相汩而不得見之古今雖以法不可名雖以事不可致惟真人返朴還純澄明寂默以守之其妙用在塵心為室除妄為真其神自虛生然無形迹妙洞三界窮生死之根達利害之源乃神之應也神無所不能致而化其神神則神在我而為真天地之神我亦神之萬象之神我亦神之神所化者在守寂不動升真氣以兩手相叠左手壓右手右手以摩頂上三千功後神自出外也氣化氣章氣至靈也千經萬論惟以存想按摩為用大悲真聖自然之數氣至靈隨心以動常欲行也蓋人心反復而氣乃澀憂思為住滯喜樂為流蕩皆失本經故真人者煉氣令圓然始以心營終别自致起於丹田轉若皮囊行之周三宫舊以三等疾速緩急之異為三車般上泥丸真祕之訣不須此耳惟以氣圓固先極功多圓轉次用他人以兩手向腰之上頭升項其氣自過乃咽華池之液四十九過真氣乃固而圓定又能養化其氣以成真故曰氣化氣乃真仙矣精化精章保精在煉氣氣正然後精固精固密然後可煉古今惟知煉氣不知煉真精之訣真人煉其精者固密其精精久不泄常欲動方以力煉之九重密閉坐先存大小固尾閭三時九氣與精交臍下若毛球動轉不已其精煉之子午二時各行三百六十功十日外真精自化奪陰陽交合返復氣液久有大益以兩手握固以大拇指按定中指文以力向上提縱動搖亦不能泄也天地可移章男子得天之純陽多者也女子得地之純陰多者也純陽之道行之易成純陰之道行之難致真人有回男作女回女作男之道蓋所以易氣也女子血盛氣衰煉血保氣男子血衰氣盛煉氣保血男子女子禀天地之正氣可以移其妙也男子煉元氣定神先守心如一外物不入萬法不著積精養神女子煉血收二乳脉按之以兩手按摩面上逆行以氣運之乃化陰陽入握章人以左手為陽內主腎半夜氣自腎生神從心降握左手不開閉左目不視存神至腎出左目下左手三百六十功乃開午時氣自心降神從腎升握右手不開閉右目不視存神至心出右目下右手三百六十功乃開如此行三千日可視千萬里之事天地山川星象草木莫不知數莫不知靈人心不測之事皆可得之矣胎息吐納章先調氣令不出不入自固密常漱華池真精三千功胎息既行津液成玄珠可吐而又納之不惟長年亦可閉尾閭成真精胎息玄珠久久自結自下上泥丸不絶則長生焉鉛汞見寶章真精生鉛鉛生黃華定神生汞汞生玄珠汞因內津而生玄珠使氣或上或下旋轉不已久久自覺津液咽下有物如珠下或欲行出之液出汲入黃中自結可結在舌上鉛因運氣而生黃華使氣不上不下向左而轉久久不已氣在臍下小便其出青色其氣自可出入運動欲出乃氣透尾閭之色金黃色如鉛丹人之修煉鉛汞見寶乃真人矣修真致妙門神出神章神煉之可以出形何謂煉神所謂守心守心惟能定神不老非可出神超生也出神超生者在圓神也古今徒說圓氣保真未說圓神煉真夫圓神煉真者先存心如明月形中倣佛有人坐煉圓不定上抵泥丸下窮丹海久久身有光彩自身中出隨其光彩出身外無有身形定洞自然因神出神故曰神出神矣氣定氣章氣真保真煉氣與天地齊年蓋以氣為道本道從氣生氣從空有真氣不搖故可長生氣者行於體內營周一身煉之從下丹田半夜所生氣處行之心營氣運力舉手按之久久肌膚紅光通明氣正而不散泄以成真矣精神氣全章修行之士須要精神氣全也精全則耳潤肌澤神全則面澤目清氣全則音響體輕夫人修行欲三者之備則定心絶念內存空洞運氣降升無有停礙保固精液還元不泄先正心咽七七口大和其津神想安居心如明月照身外氣氣無運大力上行泥丸積精不泄隨氣上升久久長生則九竅通明四肢强健耳韜形晦迹章天地賦其形氣生則居世絶俗愛死則脫殼斷塵緣生則滅形藏於影死則集神構於真皆有法焉形滅後者冬至日日初出向日行登東方山大松下手提赤芝必有鬼物相迎呼天狼七遍其鬼必自身後收黑氣走向覆身此則陰消而無影神鬼不可犯之死則集神神不散構精不移也驅神靈章神靈者因人得之或公正則為神邪淫則為鬼而修真之士欲驅之當正已神出神光於身外自然有異人驅前或送或禁皆從已命也齊老幼章老者衰少者强常理也老者反壯少者已衰一氣禀二消耗真人以法齊之老者反壯少者益强人之氣衰欲强盛者當服九仙太液法其道煉氣定神體安內八十一真液其液如不甘久久乃得甘味少者自甘以手引氣自心下腎不出七日老者如嬰兒矣長生不死章有生不死謂之長生有死不死長生者生而煉之也不死者返生也人欲長生藥欲長青松柏子葉是也丹煉太盧心定神是也欲不死藥服三黃地黃黃精甘菊是也丹煉太一守腎煉氣是也太玄寶典卷上
