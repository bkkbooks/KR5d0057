front:
  text: 太玄寶典卷中
  hash: sha256:bd3ad78ddc2b4f0dc462338004a255fda71a86dc5e10e41d2defcfafc3d63860
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0057_HFL_002-001a, image: hfl/0703/0703-148.png}
body:
  text: 煉凡全眞門輕骨章骨者天地陰陽之氣凝結生化自胎中而成由氣衝在長養而少變壯壯變老其骨之中有髓流化成精以爲一身之根元筋脉交貫而一身之動靜皆由一氣以滋榮氣血强盛則骨輕以其血滋榮提領衝動故也氣血既衰則骨重髓枯謂骨枯精竭而死也夫眞人之修行當先煉血隨氣化以周營次煉骨化乆乆神通煉心無滯成清泉則蒸鬱精隨浸潤運行血乃得化而成白玉長生之道本乎此焉煉氣圓定章氣之所生有應有度有象有理故半夜自元氣生時兩耳如風雨聲盛者如鐘磬聲其應乃子時之半爲度也乆乆修行者閉目上視見星斗光各象運其氣自下而轉不唯自尾閭行夾脊上泥丸而下降其中人復通九竅行四肢皮膚下皆循而遍周則氣圓也乆運動而反上則爲眞寂乃氣眞定氣之動靜是謂要妙氣之一動則長安氣之一靜則神應眞氣行處皮膚光澤九竅通達四肢輕便乆乆皮膚下無血但白膏耳生神水章神水之生非華池之津謂眞氣滋養澆灌之水也北方有滄海滄海生玄龜玄龜吐眞氣眞氣化神水神水生腎故神水者氣之根元由人呼吸以出入一呼出一寸一吸入一寸人能少語少思少勞動則一時生一尺人睡一時亦生一尺但夢寐之間亦有勞動魂神耳晝則無思安定守之以流夜則無夢靜念而生今修行者半夜定念端坐上吸天池下涌地脉乆乆行之精液無窮長生不死之道始於此也上吸天池灌曲江下涌地户則不飢渴能營周百脉變化凡軀矣運眞火章眞火者非心火也蓋北方有水水中生火火生北方陰之穴也光射太陽取之有法焉雙曲兩手足緊握令力通内繞腰交過會下丹田其火如龜蛇之動上盤下旋如火焰昇騰自然出腎夾脊骨循風府上頸入口出鼻透天門入泥丸自然温温如火之相逼則汗濈濈以出長生不老久久飛昇也其余應驗皆神仙之妙也嬰兒岀胎章太陽之煉左則爲龍而生嬰兒蓋水生木也木爲水子水之氣行傳流入水故青龍者木之氣也青龍負太一眞元之氣故爲嬰兒之胎因木以行到脾曰黄婆黄婆乃産育得木之制嬰兒乃生青光負之體生青光世人但知存想之功不知力致之妙其行握固以四肢力並上行自知大妙耳姹女生華章太陰之煉右則爲虎而生姹女蓋其金生水也金爲水之母金之氣行傳流入水故白虎者金之氣也白虎負眞一之氣故爲姹女之胎因金以行到腎萬金所生子也四肢百脉以力用之上下左右鼓動披衣握固心但守固不動是爲眞道體外生青紅二色光明其四象金木間隔則木生火金生水青龍緩氣以導火白虎强氣以導水行之自當有驗此眞仙之秘㫖大應其神至心七日乃得異應陰陽配合章陰中之陽陽曰至精號月華陽中之陰陰爲至靈號日精北方至陽生腎爲水水中有陽火焉南方至陰生心心爲火火中有陰水焉互相往來交氣生靈物眞火生鉛眞水生汞鉛汞交配乃可長生今人未曉其妙豈能互備故不見驗若上内華池下升地脉心降中州氣騰脾元二氣相遇自然如酒食醉飽通暢快意則百脉安和萬靈内醉骨堅髓凝可返嬰稚乆乆行之生眞身化形通天地無所不靈是其妙也煉凡生神門神體生光華章夫神體元氣集眞定神養素乆乆煉神體神體之煉乆乆生光華蓋爲氣應精精應神神應體三奇相須上下圜運火煉氣升貫百脉透百竅夜間自己視之五色雲繞身他人視已如在火中其訣蓋因密運氣氣轉而固精精堅而保神神而靈定自然發光明於身外靈通八表風氣所鐘自然旋轉不已繞身成圓光乆乆成五色雲雲天之步亦從此得耳五臟通明章夫五臟者五行之源也五行既煉則孰爲守氣也孰爲守形也左右旋轉運氣不止乆乆相通則無飢渴也則無榮衛也氣血相合精神通貫神仙默化至妙之語也其訣惟以運氣爲本守心爲上握固以佐之揭泥丸爲畢功先握固而守心守心兼運氣升則上丹田以力涌之如揭四肢手足心氣如發則内氣五臟不相關隔不惟不病五氣中和滋榮光茂通明内視如五色琉璃是其應也行之既乆其光上交五星焉四體内滌章凡人有四體外有皮膚中有骨血絶雜想而成眞人眞體能升雲天莫不先内滌四體其四體者其法端坐以兩足心相踏兩手心相合熱通五臟手氣先交脊足先交腰上下摇動汗自身出四肢則萬病自祛百邪不干何爲瘡瘍何爲痹癩修行者必先行之快氣焉三宫明黄道章三宫守一之道本自天眞皇人傳之黄帝多秘眞㫖凡自下丹田起則升氣圜運之足心發火交臍下次動中丹田則守一定神修到上丹田則般下玉精以嚥華池眞精入心如此行之則耳目萬倍光明下通腰腎神火上升故三宫有黄明之氣謂之黄道行之乆乆升雲天長年不老通神明惟黄帝先得之全焉寶火入鼎章修行者以氣爲金爲鼎鼎合在脾之下腰之上鼎中有丹丹乃二氣坎離相合於脾也鼎中有水水元氣也元氣非火不能升故火自下發者坎宫水中之火也寶火者陰中之陽日精太陽丹光上騰所行亦有法先嚥華池眞津三百六十口每日日初出存日精咽三百六十功至夜半可發以烹太陽丹焉丹光應液章丹煉二神至陽之寶内榮百脉外通九竅則神光出其液流行内有神泉澆灌外有至和之氣爲液爲汗百病不生體輕久久生清光毛行步如飛登山涉險無所不至神明相祐矣玉泉無漏章玉泉者眞精之生發也久修眞者有之所得三者之備一泥丸到流二神府無想三眞元固密其精生生不窮如水之源源不已出於山谷何爲乎摇動何爲乎禁止皆不知竭乃謂玉泉至者常潤也泉者不窮也其法蓋定神養氣上升泥丸緊固氣不泄也煉凡岀象門補神生胎章神自胎生胎從命分胎生則神生命分則神備形因氣活氣因神動神本務動氣本務圓蓋縁愛色相資漸夫本源流蕩不已則神有所損也勞形損神三分勞氣損神五分勞心損神七分負載摇動者勞形也愛欲聲色者勞氣也思慮悲愁者勞心也神之所損各有淺深眞人當先知補神之道則形全而能定神未能定徒爲寂默耳藥服人參氣煉三宫制之無事調飲食適寒温起居常均不以道拘不以俗累則得神之胎也神胎者謂神返素朴而神有所養也然後可以行定神之道矣補氣眞源章氣之所補以安體厚生養元保眞少思慮絶愛慾虛弱者先以藥補如黄精之類是也次行運元保精保息養皓之法用之惟氣强盛則眞源生矣眞源者生氣之源生命之所也大道修眞莫出乎此耳飛躑登攀章眞仙羽化之道皆由煉神所致能飛昇躍躑登高攀危者莫出乎神體欲得筋脉强盛者氣力堅固身輕體快耳神體生光華已載上經其欲得筋脉强盛者定心養血以偃卧令人按搦或自按摩半夜調息存青龍自腎生發繞腰周四肢升天地門飲華池眞津九遍咒呼天蒼七遍欲得氣力堅固精氣是也欲得身輕快亦可煉精氣神全之道也大禹步章昔大禹權制百靈蓋得天年之步天年之步者行之免三凶三凶者天地雷霆之險山川鬼神之險禽獸蠱魅之險修眞之士莫不先知行之如登雲霞步三境衆眞侍衛焉如登壇祭天入山涉險皆用之叩齒閉目存日月取在左手垂下右手南北舉左手握四指伸第二指行右指東南面東次握右手行右足指東北向東行非三境内戒之士勿出步焉度神鬼章眞人法度人以令度神法以修眞令以受戒凡經有凶惡鬼神處以令度之升爲眞官先齋戒具青詞明表開三界以丹砂九兩和以粉麵作本眞形青白二色方紙千幅亂覆焚之於大松下其松上有青白色雲自有神物見致辭而去透靈托化章人之眞靈以情昧皆由神之所存也人人皆有神靈焉縁情而昧惟眞人能以神通諸人生則夢交死則神傳夢交則夢於人神棲則假化留世焉煉氣既圓定神不亂揭天門而出神故能透焉或寄於像或託人形人形所托者神亂氣衰之人多遇則倒或醉中交應焉無情得過章神依人行物因眞化無情之物者以奇水怪之類得人之近至神透則爲精靈焉今名山大川多有之蓋依眞仙福庭之力耳而不害人多能與善利也太玄寶典卷中
