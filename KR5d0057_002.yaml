front:
  text: 太玄寶典卷中
  hash: sha256:bd3ad78ddc2b4f0dc462338004a255fda71a86dc5e10e41d2defcfafc3d63860
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0057_HFL_002-001a, image: hfl/0703/0703-148.png}
body:
  text: 煉凡全真門輕骨章骨者天地陰陽之氣凝結生化自胎中而成由氣衝在長養而少變壯壯變老其骨之中有髓流化成精以為一身之根元筋脈交貫而一身之動靜皆由一氣以滋榮氣血強盛則骨輕以其血滋榮提領衝動故也氣血既衰則骨重髓枯謂骨枯精竭而死也夫真人之修行當先煉血隨氣化以周營次煉骨化久久神通煉心無滯成清泉則蒸鬱精隨浸潤運行血乃得化而成白玉長生之道本乎此焉煉氣圓定章氣之所生有應有度有象有理故半夜自元氣生時兩耳如風雨聲盛者如鐘磬聲其應乃子時之半為度也久久修行者閉目上視見星斗光各象運其氣自下而轉不唯自尾閭行夾脊上泥丸而下降其中人復通九竅行四肢皮膚下皆循而遍周則氣圓也久運動而反上則為真寂乃氣真定氣之動靜是謂要妙氣之一動則長安氣之一靜則神應真氣行處皮膚光澤九竅通達四肢輕便久久皮膚下無血但白膏耳生神水章神水之生非華池之津謂真氣滋養澆灌之水也北方有滄海滄海生玄龜玄龜吐真氣真氣化神水神水生腎故神水者氣之根元由人呼吸以出入一呼出一寸一吸入一寸人能少語少思少勞動則一時生一尺人睡一時亦生一尺但夢寐之間亦有勞動魂神耳晝則無思安定守之以流夜則無夢靜念而生今修行者半夜定念端坐上吸天池下涌地脈久久行之精液無窮長生不死之道始於此也上吸天池灌曲江下涌地户則不飢渴能營周百脈變化凡軀矣運真火章真火者非心火也蓋北方有水水中生火火生北方陰之穴也光射太陽取之有法焉雙曲兩手足緊握令力通內繞腰交過會下丹田其火如龜蛇之動上盤下旋如火焰升騰自然出腎夾脊骨循風府上頸入口出鼻透天門入泥丸自然溫溫如火之相逼則汗濈濈以出長生不老久久飛升也其余應驗皆神仙之妙也嬰兒出胎章太陽之煉左則為龍而生嬰兒蓋水生木也木為水子水之氣行傳流入水故青龍者木之氣也青龍負太一真元之氣故為嬰兒之胎因木以行到脾曰黃婆黃婆乃産育得木之制嬰兒乃生青光負之體生青光世人但知存想之功不知力致之妙其行握固以四肢力並上行自知大妙耳姹女生華章太陰之煉右則為虎而生姹女蓋其金生水也金為水之母金之氣行傳流入水故白虎者金之氣也白虎負真一之氣故為姹女之胎因金以行到腎萬金所生子也四肢百脈以力用之上下左右鼓動披衣握固心但守固不動是為真道體外生青紅二色光明其四象金木間隔則木生火金生水青龍緩氣以導火白虎強氣以導水行之自當有驗此真仙之祕旨大應其神至心七日乃得異應陰陽配合章陰中之陽陽曰至精號月華陽中之陰陰為至靈號日精北方至陽生腎為水水中有陽火焉南方至陰生心心為火火中有陰水焉互相往來交氣生靈物真火生鉛真水生汞鉛汞交配乃可長生今人未曉其妙豈能互備故不見驗若上內華池下升地脈心降中州氣騰脾元二氣相遇自然如酒食醉飽通暢快意則百脈安和萬靈內醉骨堅髓凝可返嬰稚久久行之生真身化形通天地無所不靈是其妙也煉凡生神門神體生光華章夫神體元氣集真定神養素久久煉神體神體之煉久久生光華蓋為氣應精精應神神應體三奇相須上下圜運火煉氣升貫百脈透百竅夜間自己視之五色雲繞身他人視已如在火中其訣蓋因密運氣氣轉而固精精堅而保神神而靈定自然發光明於身外靈通八表風氣所鐘自然旋轉不已繞身成圓光久久成五色雲雲天之步亦從此得耳五臟通明章夫五臟者五行之源也五行既煉則孰為守氣也孰為守形也左右旋轉運氣不止久久相通則無飢渴也則無榮衛也氣血相合精神通貫神仙默化至妙之語也其訣惟以運氣為本守心為上握固以佐之揭泥丸為畢功先握固而守心守心兼運氣升則上丹田以力涌之如揭四肢手足心氣如發則內氣五臟不相關隔不惟不病五氣中和滋榮光茂通明內視如五色琉璃是其應也行之既久其光上交五星焉四體內滌章凡人有四體外有皮膚中有骨血絶雜想而成真人真體能升雲天莫不先內滌四體其四體者其法端坐以兩足心相踏兩手心相合熱通五臟手氣先交脊足先交腰上下搖動汗自身出四肢則萬病自祛百邪不干何為瘡瘍何為痹癩修行者必先行之快氣焉三宫明黃道章三宫守一之道本自天真皇人傳之黃帝多祕真旨凡自下丹田起則升氣圜運之足心發火交臍下次動中丹田則守一定神修到上丹田則般下玉精以咽華池真精入心如此行之則耳目萬倍光明下通腰腎神火上升故三宫有黃明之氣謂之黃道行之久久升雲天長年不老通神明惟黃帝先得之全焉寶火入鼎章修行者以氣為金為鼎鼎合在脾之下腰之上鼎中有丹丹乃二氣坎離相合於脾也鼎中有水水元氣也元氣非火不能升故火自下發者坎宫水中之火也寶火者陰中之陽日精太陽丹光上騰所行亦有法先咽華池真津三百六十口每日日初出存日精咽三百六十功至夜半可發以烹太陽丹焉丹光應液章丹煉二神至陽之寶內榮百脈外通九竅則神光出其液流行內有神泉澆灌外有至和之氣為液為汗百病不生體輕久久生清光毛行步如飛登山涉險無所不至神明相祐矣玉泉無漏章玉泉者真精之生發也久修真者有之所得三者之備一泥丸到流二神府無想三真元固密其精生生不窮如水之源源不已出於山谷何為乎搖動何為乎禁止皆不知竭乃謂玉泉至者常潤也泉者不窮也其法蓋定神養氣上升泥丸緊固氣不泄也煉凡出象門補神生胎章神自胎生胎從命分胎生則神生命分則神備形因氣活氣因神動神本務動氣本務圓蓋緣愛色相資漸夫本源流蕩不已則神有所損也勞形損神三分勞氣損神五分勞心損神七分負載搖動者勞形也愛欲聲色者勞氣也思慮悲愁者勞心也神之所損各有淺深真人當先知補神之道則形全而能定神未能定徒為寂默耳藥服人參氣煉三宫制之無事調飲食適寒溫起居常均不以道拘不以俗纍則得神之胎也神胎者謂神返素朴而神有所養也然後可以行定神之道矣補氣真源章氣之所補以安體厚生養元保真少思慮絶愛欲虛弱者先以藥補如黃精之類是也次行運元保精保息養皓之法用之惟氣強盛則真源生矣真源者生氣之源生命之所也大道修真莫出乎此耳飛躑登攀章真仙羽化之道皆由煉神所致能飛升躍躑登高攀危者莫出乎神體欲得筋脈強盛者氣力堅固身輕體快耳神體生光華已載上經其欲得筋脈強盛者定心養血以偃卧令人按搦或自按摩半夜調息存青龍自腎生發繞腰周四肢升天地門飲華池真津九遍咒呼天蒼七遍欲得氣力堅固精氣是也欲得身輕快亦可煉精氣神全之道也大禹步章昔大禹權制百靈蓋得天年之步天年之步者行之免三凶三凶者天地雷霆之險山川鬼神之險禽獸蠱魅之險修真之士莫不先知行之如登雲霞步三境衆真侍衛焉如登壇祭天入山涉險皆用之叩齒閉目存日月取在左手垂下右手南北舉左手握四指伸第二指行右指東南面東次握右手行右足指東北向東行非三境內戒之士勿出步焉度神鬼章真人法度人以令度神法以修真令以受戒凡經有凶惡鬼神處以令度之升為真官先齋戒具青詞明表開三界以丹砂九兩和以粉麵作本真形青白二色方紙千幅亂覆焚之於大松下其松上有青白色雲自有神物見致辭而去透靈托化章人之真靈以情昧皆由神之所存也人人皆有神靈焉緣情而昧惟真人能以神通諸人生則夢交死則神傳夢交則夢於人神棲則假化留世焉煉氣既圓定神不亂揭天門而出神故能透焉或寄於像或託人形人形所托者神亂氣衰之人多遇則倒或醉中交應焉無情得過章神依人行物因真化無情之物者以奇水怪之類得人之近至神透則為精靈焉今名山大川多有之蓋依真仙福庭之力耳而不害人多能與善利也太玄寶典卷中
